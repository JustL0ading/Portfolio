<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Quang-Liêm NGUYEN</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .choice-section {
            backdrop-filter: blur(10px);
            background-color: #ffffff15;
            border-style: solid;
            border-color: rgba(226, 226, 226, 0.905);
            border-radius: 25px;
            padding: 30px 20px;
            margin-bottom: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
        }

        .choice-title {
            color: var(--text-color);
            font-size: 1.5rem;
            font-weight: normal;
            margin-bottom: 20px;
            opacity: 0.85;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .choice-card {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: var(--text-color);
            padding: 30px 25px;
            border-radius: 16px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: box-shadow 0.3s ease, border 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .choice-card:hover {
            box-shadow: 0 6px 20px rgba(238, 0, 255, 0.4), 0 0 5px #2990df, 0 0 5px #2990df, 0 0 5px #2990df;
            border: 2px solid #2990df;
        }

        .choice-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.5s ease;
        }

        .choice-card:hover::before {
            left: 100%;
        }

        .choice-card .card-icon {
            font-size: 2.5rem;
        }

        .choice-card .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
        }

        .choice-card .card-desc {
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            .choice-grid {
                grid-template-columns: 1fr;
            }

            .choice-card {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="mode-button" onclick="toggleTheme()">
            <span class="icon" id="themeIcon">☀️</span>
            <span id="themeText">Mode Clair</span>
        </button>
        <h1>Portfolio</h1>
        <p class="subtitle">Quang-Liêm NGUYEN</p>

        <div class="choice-section">
            <p class="choice-title">Choisissez un portfolio :</p>
            <div class="choice-grid">
                <a href="indexScolaire.html" class="choice-card">
                    <span class="card-icon">🎓</span>
                    <span class="card-title">Portfolio Scolaire</span>
                    <span class="card-desc">BUT Informatique — Parcours A<br>Compétences & projets académiques</span>
                </a>
                <a href="indexGeneral.html" class="choice-card">
                    <span class="card-icon">💼</span>
                    <span class="card-title">Portfolio Général</span>
                    <span class="card-desc">Recherche alternance & Master<br>Projets, compétences & parcours</span>
                </a>
            </div>
        </div>

        <p class="footer">© 2025 Quang-Liêm NGUYEN | Tous droits réservés</p>
    </div>

    <script>
        let currentTheme = localStorage.getItem('theme') || 'dark';

        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');

            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'light');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Mode Sombre';
                currentTheme = 'light';
                localStorage.setItem('theme', 'light');
            } else {
                body.removeAttribute('data-theme');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Mode Clair';
                currentTheme = 'dark';
                localStorage.setItem('theme', 'dark');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            if (currentTheme === 'light') {
                body.setAttribute('data-theme', 'light');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Mode Sombre';
            } else {
                body.removeAttribute('data-theme');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Mode Clair';
            }
        });
    </script>
</body>
</html>
